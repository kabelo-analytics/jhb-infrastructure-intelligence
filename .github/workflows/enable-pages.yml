name: Enable GitHub Pages

on:
  push:
    branches: [main]
    paths: ['.github/workflows/enable-pages.yml']

permissions:
  pages: write
  contents: read
  administration: write

jobs:
  enable-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Enable GitHub Pages (branch source)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Attempting POST to create Pages..."
          POST_RESULT=$(curl -s -o /tmp/post_response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"source":{"branch":"main","path":"/"}}')
          echo "POST response code: $POST_RESULT"
          cat /tmp/post_response.json

          if [ "$POST_RESULT" = "409" ] || [ "$POST_RESULT" = "422" ]; then
            echo "Pages may already exist — attempting PATCH..."
            PATCH_RESULT=$(curl -s -o /tmp/patch_response.json -w "%{http_code}" \
              -X PATCH \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/pages" \
              -d '{"source":{"branch":"main","path":"/"}}')
            echo "PATCH response code: $PATCH_RESULT"
            cat /tmp/patch_response.json
          fi

          echo ""
          echo "Final Pages status check:"
          curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pages"
